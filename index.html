<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Test Orders · Rider Ops</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { min-height: 100vh; background: #0f172a; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 28px 16px; }
  .eyebrow { color: #f97316; font-size: 11px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 4px; text-align:center; }
  .title { color: #f1f5f9; font-size: 20px; font-weight: 700; text-align:center; margin-bottom: 20px; }
  .card { background: #1e293b; border-radius: 20px; padding: 24px 20px; width: 100%; max-width: 420px; box-shadow: 0 8px 40px rgba(0,0,0,0.4); border: 1px solid #334155; }
  label.lbl { color: #94a3b8; font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; display: block; margin-bottom: 7px; }
  input, select { width: 100%; background: #0f172a; border: 1.5px solid #334155; border-radius: 10px; color: #f1f5f9; font-size: 15px; font-weight: 600; padding: 11px 13px; outline: none; transition: border-color 0.2s; margin-bottom: 16px; }
  input:focus, select:focus { border-color: #f97316; }
  select option { background: #1e293b; }
  .btn { border: none; border-radius: 12px; padding: 13px 0; font-size: 15px; font-weight: 700; cursor: pointer; width: 100%; transition: opacity 0.2s; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-green  { background: #22c55e; color: #fff; }
  .btn-red    { background: #dc2626; color: #fff; }
  .btn-orange { background: #f97316; color: #fff; }
  .btn-slate  { background: #334155; color: #cbd5e1; }
  .btn-blue   { background: #3b82f6; color: #fff; }
  .row { display: flex; gap: 10px; }
  .row > * { flex: 1; }
  .ring-wrap { text-align: center; margin: 14px 0; }
  .ring { display: inline-flex; align-items: center; justify-content: center; width: 150px; height: 150px; border-radius: 50%; border: 4px solid #334155; background: #0f172a; flex-direction: column; transition: border-color 0.3s, box-shadow 0.3s; }
  .ring-time { color: #f1f5f9; font-size: 30px; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: 1px; }
  .ring-status { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }
  .result-box { background: #0f172a; border: 1.5px solid #f97316; border-radius: 12px; padding: 11px 0; text-align: center; }
  .rlbl { color: #94a3b8; font-size: 10px; font-weight: 600; letter-spacing: 1px; }
  .rval { color: #f97316; font-size: 18px; font-weight: 800; }
  .divider { border-top: 1px solid #334155; margin: 18px 0; }
  .status-msg { text-align: center; font-size: 12px; font-weight: 600; margin-top: 10px; }
  .pending-banner { margin: 8px auto 0; background: #78350f; color: #fbbf24; font-size: 12px; font-weight: 700; border-radius: 8px; padding: 5px 14px; display: inline-block; }
  .log-wrap { width: 100%; max-width: 420px; margin-top: 22px; }
  .log-label { color: #64748b; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
  .log-item { background: #1e293b; border-radius: 10px; padding: 11px 14px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #334155; margin-bottom: 7px; }
  .log-item.pending { border-color: #78350f; }
  .log-id { color: #f1f5f9; font-size: 13px; font-weight: 700; }
  .log-branch { color: #64748b; font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; }
  .log-ts { color: #64748b; font-size: 11px; }
  .log-pickup { color: #f97316; font-size: 13px; font-weight: 700; }
  .log-review { color: #3b82f6; font-size: 13px; font-weight: 700; }
  .section-gap { margin-top: 14px; }
  .counter-badge { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 8px 18px; display: inline-flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .counter-num { color: #f97316; font-size: 26px; font-weight: 800; font-variant-numeric: tabular-nums; }
  .counter-lbl { color: #64748b; font-size: 12px; font-weight: 600; }
</style>
</head>
<body>

<div class="eyebrow">Rider Ops</div>
<div class="title">Test Orders</div>
<div id="pending-wrap" style="text-align:center;margin-bottom:6px"></div>
<div id="counter-wrap" style="text-align:center;margin-bottom:12px"></div>
<div class="card" id="app"></div>
<div id="log-section"></div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxqnLHXrplHA2UNf90u0PXAvurGEbY0vpuriv_O4jI2SneWHZ4UtgYP9SrMNVWZa9RD/exec";

const BRANCHES = [
  "Tmart, Haram - Talbiya 2","Tmart, El Sheikh Zayed - El Hay 13",
  "Tmart, 6th Of October - Palm Hills 360 Mall","Tmart, 6th of October - El Montzah",
  "Tmart, 6th of October - 6th District","talabat mart, Downtown - El Sayeda Zeinab",
  "talabat mart, Zahraa El Maadi - El Shatr El Sades","talabat mart, Zahraa El Maadi - El Me`arag El Ouloy",
  "talabat mart, Shobra - El Sahel","talabat mart, New Maadi - Taqseem Laselky",
  "talabat mart, Nasr City - El Hadeeqa El Dawlia","talabat mart, Mokattam - El Nafora Square",
  "talabat mart, Mokattam - El Mafarik","talabat mart, Mokattam - Easy Sport Club",
  "talabat mart, Mohandesin - Lebanon square","talabat mart, Maadi Old",
  "talabat mart, Helwan","talabat mart, Heliopolis - Hegaz Square",
  "talabat mart, Hadayek El Ahram - Area ح","talabat mart, Faisal - Maryoteya",
  "talabat mart, El Zaitoun - Al Gharbeya","talabat mart, El Sheikh Zayed - El Hay 9",
  "talabat mart, El Daher","talabat mart, Dokki - Mosaddak",
  "talabat mart, Ard El Golf","talabat mart, Al-Manial",
  "talabat mart, Agouza","talabat mart, 6th of October - Wahet El Mohandsen",
  "talabat mart, 6th Of October - Palm Hills","talabat mart, 6th of October - 4th District",
  "talabat mart, Haram - Tersa","Tmart, Tagammoa 5 - Hay 1",
  "Tmart, Tagammoa 5 - Emaar Mivida","tmart, Nasr City - Omarat El Tawfiq",
  "Tmart, Masaken Sheraton - Abdel Hamid Badwai","Tmart, Madinaty - Work Shops",
  "Tmart, ElNakheel compound","Tmart, El Shorouk - 3rd District",
  "Tmart, El Obour Industrial Area BG","Tmart, Creek town Compound",
  "talabat mart, Madinaty - Sporting Club","talabat mart, Tagmoaa 5 - AUC",
  "talabat mart, Tagammoa 5 - South Investors","talabat mart, Tagammoa 5 - El Lotus El Shamaleya",
  "talabat mart, Tagammoa 5 - El Banafseg Buildings","talabat mart, Tagammoa 1",
  "talabat mart, Nasr City - Masaken El Shorouk","Talabat Mart, Nasr City - Hay 8",
  "talabat mart, Nasr City - El Tayaran","talabat mart, Matareya",
  "talabat mart, El Shorouk - 1st Area","talabat mart, El Rehab City",
  "talabat mart, El Obour - El Hay 9","talabat mart, Tagammoa 5 - Banks Center"
];

const QUEUE_KEY = "ot_queue";
const fmtMs = ms => {
  const s = Math.floor(ms/1000), m = Math.floor(s/60);
  return `${String(m).padStart(2,'0')}:${String(s%60).padStart(2,'0')}.${String(Math.floor((ms%1000)/10)).padStart(2,'0')}`;
};
const loadQ = () => { try { return JSON.parse(localStorage.getItem(QUEUE_KEY)||"[]"); } catch { return []; } };
const saveQ = q => localStorage.setItem(QUEUE_KEY, JSON.stringify(q));

async function sendWithRetry(payload, retries=3) {
  for (let i=0; i<retries; i++) {
    try {
      await fetch(APPS_SCRIPT_URL, {
        method: "POST", mode: "no-cors",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(payload)
      });
      return { ok: true };
    } catch {}
    await new Promise(r => setTimeout(r, 1200*(i+1)));
  }
  return { ok: false };
}

let state = {
  branch: localStorage.getItem("ot_branch") || BRANCHES[0],
  orderId: "",
  sessionCount: 0,
  // Pickup stopwatch
  pickupElapsed: 0, pickupRunning: false, pickupDone: false,
  pickupStart: null, pickupMs: null,
  // Review stopwatch
  reviewElapsed: 0, reviewRunning: false, reviewDone: false,
  reviewStart: null, reviewMs: null,
  // UI
  saving: false, saveStatus: null,
  pendingCount: loadQ().length,
  log: []
};
let pickupTicker = null, reviewTicker = null;

async function flushQueue() {
  const q = loadQ(); if (!q.length) return;
  const remaining = [];
  for (const item of q) { const r = await sendWithRetry(item); if (!r.ok) remaining.push(item); }
  saveQ(remaining); state.pendingCount = remaining.length; renderPending();
}
window.addEventListener("online", flushQueue);
flushQueue();

function renderPending() {
  document.getElementById("pending-wrap").innerHTML = state.pendingCount > 0
    ? `<div class="pending-banner">⏳ ${state.pendingCount} أوردر لسه مش اتبعت</div>` : "";
  document.getElementById("counter-wrap").innerHTML = `
    <div class="counter-badge">
      <div class="counter-num">${state.sessionCount}</div>
      <div class="counter-lbl">تسجيل في هذه الجلسة</div>
    </div>`;
}

function render() {
  renderPending();
  const s = state;

  // Pickup ring
  const pc = s.pickupRunning ? "#22c55e" : s.pickupDone ? "#f97316" : "#334155";
  const pg = s.pickupRunning ? `box-shadow:0 0 24px ${pc}55` : "";

  // Review ring
  const rc = s.reviewRunning ? "#3b82f6" : s.reviewDone ? "#a78bfa" : "#334155";
  const rg = s.reviewRunning ? `box-shadow:0 0 24px ${rc}55` : "";

  const pickupStatus = s.pickupRunning ? "Running" : s.pickupDone ? "Stopped" : "Ready";
  const reviewStatus = s.reviewRunning ? "Running" : s.reviewDone ? "Stopped" : "Ready";

  // Pickup buttons
  let pickupBtn = "";
  if (!s.pickupRunning && !s.pickupDone)
    pickupBtn = `<button class="btn btn-green" onclick="startPickup()">▶ Start</button>`;

  else if (s.pickupRunning)
    pickupBtn = `<button class="btn btn-red" onclick="stopPickup()">■ Stop</button>`;
  else if (s.pickupDone)
    pickupBtn = `<div class="result-box"><div class="rlbl">مدة الاستلام</div><div class="rval">${fmtMs(s.pickupMs)}</div></div>`;

  // Review buttons
  let reviewBtn = "";
  if (s.pickupDone) {
    if (!s.reviewRunning && !s.reviewDone)
      reviewBtn = `<button class="btn btn-blue" onclick="startReview()">▶ Start</button>`;
    else if (s.reviewRunning)
      reviewBtn = `<button class="btn btn-red" onclick="stopReview()">■ Stop</button>`;
    else if (s.reviewDone)
      reviewBtn = `<div class="result-box" style="border-color:#a78bfa"><div class="rlbl">وقت المراجعة</div><div class="rval" style="color:#a78bfa">${fmtMs(s.reviewMs)}</div></div>`;
  }

  // Save/Reset — submit يظهر بعد pickup، المراجعة اختيارية
  let saveRow = "";
  if (s.pickupDone && !s.reviewRunning) {
    const hasOrder = s.orderId.trim().length > 0;
    saveRow = `
      <div id="save-row">
        <div class="row section-gap">
          <button class="btn btn-orange" onclick="submitEntry()" ${s.saving||!hasOrder?'disabled':''} style="${!hasOrder?'opacity:0.35':''}">
            ${s.saving?'⏳ جاري الحفظ...':'✓ حفظ في الشيت'}
          </button>
          <button class="btn btn-slate" onclick="resetAll()">↺ تسجيل جديد</button>
        </div>
        ${!hasOrder ? '<div class="status-msg" style="color:#f59e0b">⚠ حط Order ID عشان تحفظ</div>' : ''}
        ${s.saveStatus==='ok'     ? '<div class="status-msg" style="color:#22c55e">✓ اتحفظ في الشيت</div>' : ''}
        ${s.saveStatus==='queued' ? '<div class="status-msg" style="color:#f59e0b">📵 اتحفظ محلياً — هيتبعت أول ما يرجع النت</div>' : ''}
        ${s.saveStatus==='err'    ? '<div class="status-msg" style="color:#ef4444">✗ فشل الحفظ</div>' : ''}
      </div>
    `;
  } else if (s.reviewRunning) {
    saveRow = `<div class="section-gap"><button class="btn btn-slate" onclick="resetAll()">↺ إلغاء وبدأ من الأول</button></div>`;
  }

  document.getElementById("app").innerHTML = `
    <label class="lbl">الفرع</label>
    <select id="inp-branch" onchange="state.branch=this.value;localStorage.setItem('ot_branch',this.value)" ${s.pickupRunning||s.pickupDone?'disabled style="opacity:0.5"':''}>
      ${BRANCHES.map(b=>`<option ${b===s.branch?'selected':''}>${b}</option>`).join('')}
    </select>

    <label class="lbl">Order ID</label>
    <input id="inp-order" type="number" inputmode="numeric" placeholder="123456789" value="${s.orderId}"
      style="border-color:${s.orderId?'#f97316':'#334155'}"
      oninput="state.orderId=this.value.replace(/[^0-9]/g,'');renderSaveRow()"/>

    <div class="divider" style="margin:4px 0 14px"></div>

    <label class="lbl" style="color:#94a3b8">📦 وقت الاستلام</label>
    <div style="color:#475569;font-size:11px;margin-bottom:10px;line-height:1.5">يبدأ بمجرد وصول الطيار مكان التسليم وينتهي بمجرد استلامه الأوردر</div>
    <div class="ring-wrap">
      <div class="ring" style="border-color:${pc};${pg}">
        <div class="ring-time" id="pickup-time">${fmtMs(s.pickupElapsed)}</div>
        <div class="ring-status" style="color:${pc}">${pickupStatus}</div>
      </div>
    </div>
    <div>${pickupBtn}</div>

    ${s.pickupDone ? `
    <div class="divider"></div>
    <label class="lbl" style="color:#94a3b8">🔍 وقت مراجعة الأوردر</label>
    <div style="color:#475569;font-size:11px;margin-bottom:10px;line-height:1.5">الوقت اللي هياخده الطيار وهو بيراجع الأوردر</div>
    <div class="ring-wrap">
      <div class="ring" style="border-color:${rc};${rg}">
        <div class="ring-time" id="review-time">${fmtMs(s.reviewElapsed)}</div>
        <div class="ring-status" style="color:${rc}">${reviewStatus}</div>
      </div>
    </div>
    <div>${reviewBtn}</div>
    ` : ''}

    ${saveRow}
  `;

  renderLog();
}

function renderLog() {
  if (!state.log.length) { document.getElementById("log-section").innerHTML=""; return; }
  document.getElementById("log-section").innerHTML = `
    <div class="log-wrap">
      <div class="log-label">Session Log</div>
      ${state.log.map(e=>`
        <div class="log-item ${e.pending?'pending':''}">
          <div style="overflow:hidden;flex:1">
            <div class="log-id">#${e.orderId}</div>
            <div class="log-branch">${e.branch}</div>
            <div class="log-ts">${e.ts}${e.pending?' · ⏳ pending':''}</div>
          </div>
          <div style="text-align:left;flex-shrink:0;margin-right:8px">
            <div class="log-pickup">📦 ${e.pickup}</div>
            <div class="log-review">🔍 ${e.review}</div>
          </div>
        </div>`).join('')}
    </div>`;
}

// ── Pickup ──
function startPickup() {
  const inp = document.getElementById("inp-order");
  if (inp) state.orderId = inp.value.trim();
  state.pickupElapsed=0; state.pickupMs=null; state.pickupDone=false;
  state.reviewElapsed=0; state.reviewMs=null; state.reviewDone=false;
  state.saveStatus=null;
  state.pickupStart = Date.now(); state.pickupRunning=true;
  pickupTicker = setInterval(()=>{
    state.pickupElapsed = Date.now()-state.pickupStart;
    const el = document.getElementById("pickup-time");
    if (el) el.textContent = fmtMs(state.pickupElapsed);
    // sync order ID from input without re-render
    const inp = document.getElementById("inp-order");
    if (inp) state.orderId = inp.value.trim();
  }, 50);
  render();
}

function stopPickup() {
  clearInterval(pickupTicker);
  state.pickupMs = state.pickupElapsed;
  state.pickupRunning=false; state.pickupDone=true;
  render();
}

// ── Review ──
function startReview() {
  state.reviewElapsed=0; state.reviewMs=null; state.reviewDone=false;
  state.reviewStart = Date.now(); state.reviewRunning=true;
  reviewTicker = setInterval(()=>{
    state.reviewElapsed = Date.now()-state.reviewStart;
    const el = document.getElementById("review-time");
    if (el) el.textContent = fmtMs(state.reviewElapsed);
  }, 50);
  render();
}

function stopReview() {
  clearInterval(reviewTicker);
  state.reviewMs = state.reviewElapsed;
  state.reviewRunning=false; state.reviewDone=true;
  render();
}

// ── Submit ──
async function submitEntry() {
  state.saving=true; state.saveStatus=null; render();
  const payload = {
    orderId: state.orderId,
    branch: state.branch,
    pickupMs: state.pickupMs,
    reviewMs: state.reviewMs,
  };
  const result = await sendWithRetry(payload);
  const entry = {
    orderId: payload.orderId, branch: state.branch,
    pickup: fmtMs(state.pickupMs),
    review: fmtMs(state.reviewMs),
    ts: new Date().toLocaleTimeString("ar-EG"),
    pending: !result.ok
  };
  if (result.ok) { state.saveStatus="ok"; state.sessionCount++; }
  else {
    const q=loadQ(); q.push({...payload,_queuedAt:Date.now()}); saveQ(q);
    state.pendingCount=q.length; state.saveStatus="queued";
  }
  state.log.unshift(entry);
  state.saving=false; render();
}

// ── Reset ──
function renderSaveRow() {
  const el = document.getElementById("save-row");
  if (!el || !state.pickupDone) return;
  const hasOrder = state.orderId.trim().length > 0;
  el.innerHTML = `
    <div class="row section-gap">
      <button class="btn btn-orange" onclick="submitEntry()" ${state.saving||!hasOrder?'disabled':''} style="${!hasOrder?'opacity:0.35':''}">
        ${state.saving?'⏳ جاري الحفظ...':'✓ حفظ في الشيت'}
      </button>
      <button class="btn btn-slate" onclick="resetAll()">↺ جديد</button>
    </div>
    ${!hasOrder ? '<div class="status-msg" style="color:#f59e0b">⚠ حط Order ID عشان تحفظ</div>' : ''}
    ${state.saveStatus==='ok'     ? '<div class="status-msg" style="color:#22c55e">✓ اتحفظ في الشيت</div>' : ''}
    ${state.saveStatus==='queued' ? '<div class="status-msg" style="color:#f59e0b">📵 اتحفظ محلياً — هيتبعت أول ما يرجع النت</div>' : ''}
  `;
}

function resetAll() {
  clearInterval(pickupTicker); clearInterval(reviewTicker);
  state.orderId="";
  state.pickupElapsed=0; state.pickupRunning=false; state.pickupDone=false; state.pickupMs=null;
  state.reviewElapsed=0; state.reviewRunning=false; state.reviewDone=false; state.reviewMs=null;
  state.saving=false; state.saveStatus=null;
  render();
}

render();
</script>
</body>
</html>
