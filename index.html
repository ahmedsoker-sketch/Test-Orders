<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Order Timer · Rider Ops</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { min-height: 100vh; background: #0f172a; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 32px 16px; }
  .eyebrow { color: #f97316; font-size: 11px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 6px; }
  .title { color: #f1f5f9; font-size: 22px; font-weight: 700; }
  .subtitle { color: #94a3b8; font-size: 13px; margin-top: 6px; }
  .card { background: #1e293b; border-radius: 20px; padding: 28px 22px; width: 100%; max-width: 400px; box-shadow: 0 8px 40px rgba(0,0,0,0.4); border: 1px solid #334155; }
  label.lbl { color: #94a3b8; font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; display: block; margin-bottom: 8px; }
  input, select { width: 100%; background: #0f172a; border: 1.5px solid #334155; border-radius: 10px; color: #f1f5f9; font-size: 16px; font-weight: 600; padding: 12px 14px; outline: none; transition: border-color 0.2s; }
  input:focus, select:focus { border-color: #f97316; }
  select option { background: #1e293b; }
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  .btn { border: none; border-radius: 12px; padding: 14px 0; font-size: 15px; font-weight: 700; cursor: pointer; width: 100%; transition: opacity 0.2s; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-green  { background: #22c55e; color: #fff; }
  .btn-red    { background: #dc2626; color: #fff; }
  .btn-orange { background: #f97316; color: #fff; }
  .btn-slate  { background: #334155; color: #cbd5e1; }
  .row { display: flex; gap: 10px; }
  .row > * { flex: 1; }
  .ring-wrap { text-align: center; margin: 20px 0; }
  .ring { display: inline-flex; align-items: center; justify-content: center; width: 170px; height: 170px; border-radius: 50%; border: 4px solid #334155; background: #0f172a; flex-direction: column; transition: border-color 0.3s, box-shadow 0.3s; }
  .ring-time { color: #f1f5f9; font-size: 34px; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: 1px; }
  .ring-status { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; color: #475569; }
  .result-box { background: #0f172a; border: 1.5px solid #f97316; border-radius: 12px; padding: 12px 0; text-align: center; }
  .result-box .rlbl { color: #94a3b8; font-size: 10px; font-weight: 600; letter-spacing: 1px; }
  .result-box .rval { color: #f97316; font-size: 20px; font-weight: 800; }
  .divider { border-top: 1px solid #334155; margin: 20px 0; }
  .manual-total { background: #0f172a; border: 1.5px solid #334155; border-radius: 12px; padding: 10px 0; text-align: center; }
  .manual-total .rlbl { color: #64748b; font-size: 10px; }
  .manual-total .rval { color: #94a3b8; font-size: 20px; font-weight: 800; font-variant-numeric: tabular-nums; }
  .colon { color: #475569; font-size: 28px; font-weight: 700; display: flex; align-items: center; padding-top: 18px; flex: 0 0 auto !important; }
  .status-msg { text-align: center; font-size: 12px; font-weight: 600; margin-top: 10px; }
  .pending-banner { margin-top: 8px; background: #78350f; color: #fbbf24; font-size: 12px; font-weight: 700; border-radius: 8px; padding: 5px 14px; display: inline-block; }
  .log-wrap { width: 100%; max-width: 400px; margin-top: 24px; }
  .log-label { color: #64748b; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; }
  .log-item { background: #1e293b; border-radius: 10px; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #334155; margin-bottom: 8px; }
  .log-item.pending { border-color: #78350f; }
  .log-id { color: #f1f5f9; font-size: 14px; font-weight: 700; }
  .log-ts { color: #64748b; font-size: 11px; }
  .log-durations { text-align: left; }
  .log-pickup { color: #f97316; font-size: 13px; font-weight: 700; }
  .log-review { color: #94a3b8; font-size: 13px; font-weight: 700; }
  .change-btn { background: none; border: none; color: #475569; font-size: 12px; cursor: pointer; margin-right: 8px; }
  .section-gap { margin-top: 20px; }
  .mini-lbl { color: #64748b; font-size: 10px; margin-bottom: 4px; text-align: center; }
  input.center { text-align: center; font-size: 22px; font-weight: 800; padding: 10px 8px; }
</style>
</head>
<body>

<div id="header" style="margin-bottom:20px;text-align:center"></div>
<div id="app"></div>
<div id="log-section"></div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwM0WcVfvz6z-6zlsb03697NGPvpHZcJfJDceu4n2WTyvOrZ4Oqit4XEzxQ3hr9O-Q7/exec";
const ZONES = ["Mohandiseen","Hadayek el Qobba","Shobra","October","Giza","Other"];
const QUEUE_KEY = "ot_queue";

// ── Helpers ──
const fmtMs = ms => {
  const s = Math.floor(ms/1000), m = Math.floor(s/60);
  return `${String(m).padStart(2,'0')}:${String(s%60).padStart(2,'0')}.${String(Math.floor((ms%1000)/10)).padStart(2,'0')}`;
};
const fmtManual = (m,s) => `${String(+m||0).padStart(2,'0')}:${String(+s||0).padStart(2,'0')}`;
const loadQ = () => { try { return JSON.parse(localStorage.getItem(QUEUE_KEY)||"[]"); } catch { return []; } };
const saveQ = q => localStorage.setItem(QUEUE_KEY, JSON.stringify(q));

async function sendWithRetry(payload, retries=3) {
  for (let i=0; i<retries; i++) {
    try {
      const res = await fetch(APPS_SCRIPT_URL, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(payload) });
      const json = await res.json();
      if (json.success || json.duplicate) return { ok:true, duplicate:!!json.duplicate };
    } catch {}
    await new Promise(r => setTimeout(r, 1200*(i+1)));
  }
  return { ok:false };
}

// ── State ──
let state = {
  screen: localStorage.getItem("ot_agent") ? "main" : "setup",
  agent:  localStorage.getItem("ot_agent") || "",
  zone:   localStorage.getItem("ot_zone")  || ZONES[0],
  orderId: "", elapsed: 0, running: false, finished: false,
  startTime: null, finalMs: null,
  reviewMins: "", reviewSecs: "",
  saving: false, saveStatus: null,
  pendingCount: loadQ().length,
  log: []
};
let ticker = null;

// ── Flush queue ──
async function flushQueue() {
  const q = loadQ(); if (!q.length) return;
  const remaining = [];
  for (const item of q) {
    const r = await sendWithRetry(item);
    if (!r.ok) remaining.push(item);
  }
  saveQ(remaining);
  state.pendingCount = remaining.length;
  render();
}
window.addEventListener("online", flushQueue);
flushQueue();

// ── Render ──
function render() {
  if (state.screen === "setup") renderSetup();
  else renderMain();
}

function renderSetup() {
  document.getElementById("header").innerHTML = "";
  document.getElementById("log-section").innerHTML = "";
  document.getElementById("app").innerHTML = `
    <div class="card" style="max-width:400px;width:100%">
      <div style="text-align:center;margin-bottom:24px">
        <div class="eyebrow">Rider Ops</div>
        <div class="title">من أنت؟</div>
        <div class="subtitle">بتتسجل مرة واحدة على الجهاز</div>
      </div>
      <label class="lbl">اسمك</label>
      <input id="inp-agent" placeholder="Mohamed Salah" value="${state.agent}" style="margin-bottom:16px"/>
      <label class="lbl">الزون</label>
      <select id="inp-zone" style="margin-bottom:24px">
        ${ZONES.map(z=>`<option ${z===state.zone?'selected':''}>${z}</option>`).join('')}
      </select>
      <button class="btn btn-orange" onclick="saveAgent()">ابدأ ←</button>
    </div>`;
}

function saveAgent() {
  const a = document.getElementById("inp-agent").value.trim();
  const z = document.getElementById("inp-zone").value;
  if (!a) return;
  state.agent = a; state.zone = z;
  localStorage.setItem("ot_agent", a);
  localStorage.setItem("ot_zone", z);
  state.screen = "main";
  render();
}

function renderMain() {
  const s = state;
  const ringColor = s.running ? "#22c55e" : s.finished ? "#f97316" : "#334155";
  const ringGlow  = s.running ? `box-shadow:0 0 28px ${ringColor}55` : "";

  document.getElementById("header").innerHTML = `
    <div class="eyebrow">Rider Ops · Order Timer</div>
    <div class="subtitle">
      <button class="change-btn" onclick="changeAgent()">تغيير</button>
      ${s.agent} — <span style="color:#f97316">${s.zone}</span>
    </div>
    ${s.pendingCount > 0 ? `<div class="pending-banner">⏳ ${s.pendingCount} أوردر لسه مش اتبعت — هيتبعت أول ما يرجع النت</div>` : ''}
  `;

  let btnHtml = "";
  if (!s.running && !s.finished)
    btnHtml = `<button class="btn btn-green" onclick="startTimer()" ${!s.orderId.trim()?'disabled':''}>▶ Start</button>`;
  else if (s.running)
    btnHtml = `<button class="btn btn-red" onclick="stopTimer()">■ Stop</button>`;

  let resultHtml = "";
  if (s.finished) resultHtml = `
    <div class="result-box">
      <div class="rlbl">مدة الاستلام</div>
      <div class="rval">${fmtMs(s.finalMs)}</div>
    </div>`;

  let reviewHtml = "";
  if (s.finished) reviewHtml = `
    <div class="divider"></div>
    <label class="lbl">وقت مراجعة الأوردر <span style="color:#475569;font-weight:400;text-transform:none;letter-spacing:0">(يدوي)</span></label>
    <div class="row" style="align-items:flex-end">
      <div>
        <div class="mini-lbl">دقايق</div>
        <input class="center" type="number" min="0" max="59" placeholder="00" id="inp-rmins" value="${s.reviewMins}" oninput="updateReview()" />
      </div>
      <div class="colon">:</div>
      <div>
        <div class="mini-lbl">ثواني</div>
        <input class="center" type="number" min="0" max="59" placeholder="00" id="inp-rsecs" value="${s.reviewSecs}" oninput="updateReview()" />
      </div>
      <div>
        <div class="mini-lbl">المجموع</div>
        <div class="manual-total">
          <div class="rval">${fmtManual(s.reviewMins, s.reviewSecs)}</div>
        </div>
      </div>
    </div>
    <div class="row section-gap">
      <button class="btn btn-orange" onclick="submitEntry()" ${s.saving?'disabled':''}>${s.saving?'⏳ جاري الحفظ...':'✓ حفظ في الشيت'}</button>
      <button class="btn btn-slate" onclick="resetTimer()">↺ جديد</button>
    </div>
    ${s.saveStatus==='ok'        ? '<div class="status-msg" style="color:#22c55e">✓ اتحفظ في الشيت</div>' : ''}
    ${s.saveStatus==='duplicate' ? '<div class="status-msg" style="color:#f59e0b">⚠ الأوردر ده اتسجل قبل كده النهارده</div>' : ''}
    ${s.saveStatus==='queued'    ? '<div class="status-msg" style="color:#f59e0b">📵 النت واقع — اتحفظ محلياً وهيتبعت أوتوماتيك</div>' : ''}
    ${s.saveStatus==='err'       ? '<div class="status-msg" style="color:#ef4444">✗ فشل الحفظ</div>' : ''}
  `;

  document.getElementById("app").innerHTML = `
    <div class="card" style="max-width:400px;width:100%">
      <label class="lbl">Order ID</label>
      <input id="inp-order" placeholder="123456789" value="${s.orderId}"
        style="border-color:${s.orderId&&!s.running?'#f97316':'#334155'};opacity:${s.running||s.finished?0.6:1};margin-bottom:20px"
        ${s.running||s.finished?'disabled':''} oninput="state.orderId=this.value" />

      <label class="lbl">مدة الاستلام</label>
      <div class="ring-wrap">
        <div class="ring" style="border-color:${ringColor};${ringGlow}">
          <div class="ring-time">${fmtMs(s.elapsed)}</div>
          <div class="ring-status" style="color:${s.running?'#22c55e':s.finished?'#f97316':'#475569'}">
            ${s.running?'Running':s.finished?'Stopped':'Ready'}
          </div>
        </div>
      </div>

      <div class="row">
        <div>${btnHtml}</div>
        ${s.finished ? `<div>${resultHtml}</div>` : ''}
      </div>

      ${reviewHtml}
    </div>`;

  renderLog();
}

function renderLog() {
  if (!state.log.length) { document.getElementById("log-section").innerHTML=""; return; }
  document.getElementById("log-section").innerHTML = `
    <div class="log-wrap">
      <div class="log-label">Session Log</div>
      ${state.log.map(e=>`
        <div class="log-item ${e.pending?'pending':''}">
          <div>
            <div class="log-id">#${e.orderId}</div>
            <div class="log-ts">${e.ts}${e.pending?' · ⏳ pending':''}</div>
          </div>
          <div class="log-durations">
            <div class="log-pickup">📦 ${e.pickup}</div>
            <div class="log-review">🔍 ${e.review}</div>
          </div>
        </div>`).join('')}
    </div>`;
}

// ── Actions ──
function changeAgent() { state.screen="setup"; render(); }

function startTimer() {
  state.orderId = document.getElementById("inp-order")?.value.trim() || state.orderId;
  if (!state.orderId) return;
  state.elapsed=0; state.finalMs=null; state.finished=false; state.saveStatus=null;
  state.reviewMins=""; state.reviewSecs="";
  state.startTime = Date.now(); state.running=true;
  ticker = setInterval(()=>{ state.elapsed=Date.now()-state.startTime; updateRing(); }, 50);
  render();
}

function stopTimer() {
  clearInterval(ticker);
  state.finalMs = state.elapsed;
  state.running=false; state.finished=true;
  render();
}

function updateRing() {
  const el = document.querySelector(".ring-time");
  if (el) el.textContent = fmtMs(state.elapsed);
}

function updateReview() {
  state.reviewMins = document.getElementById("inp-rmins")?.value || "";
  state.reviewSecs = document.getElementById("inp-rsecs")?.value || "";
  const el = document.querySelector(".manual-total .rval");
  if (el) el.textContent = fmtManual(state.reviewMins, state.reviewSecs);
}

async function submitEntry() {
  state.saving=true; state.saveStatus=null; render();
  const payload = {
    orderId: state.orderId,
    agent: state.agent,
    zone: state.zone,
    pickupMs: state.finalMs,
    reviewMins: parseInt(state.reviewMins)||0,
    reviewSecs: parseInt(state.reviewSecs)||0,
  };
  const result = await sendWithRetry(payload);
  const entry = {
    orderId: payload.orderId,
    pickup: fmtMs(state.finalMs),
    review: fmtManual(payload.reviewMins, payload.reviewSecs),
    ts: new Date().toLocaleTimeString("ar-EG"),
    pending: !result.ok
  };
  if (result.duplicate) { state.saveStatus="duplicate"; }
  else if (result.ok)   { state.saveStatus="ok"; state.log.unshift(entry); }
  else {
    const q = loadQ(); q.push({...payload, _queuedAt:Date.now()}); saveQ(q);
    state.pendingCount = q.length;
    state.saveStatus="queued";
    state.log.unshift(entry);
  }
  state.saving=false; render();
}

function resetTimer() {
  clearInterval(ticker);
  state.elapsed=0; state.finalMs=null; state.running=false; state.finished=false;
  state.orderId=""; state.reviewMins=""; state.reviewSecs=""; state.saveStatus=null;
  render();
}

// ── Init ──
render();
</script>
</body>
</html>
