<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Test Orders · Rider Ops</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { min-height: 100vh; background: #0f172a; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 28px 16px; }
  .eyebrow { color: #f97316; font-size: 11px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 4px; text-align:center; }
  .title { color: #f1f5f9; font-size: 20px; font-weight: 700; text-align:center; margin-bottom: 20px; }
  .card { background: #1e293b; border-radius: 20px; padding: 24px 20px; width: 100%; max-width: 420px; box-shadow: 0 8px 40px rgba(0,0,0,0.4); border: 1px solid #334155; }
  label.lbl { color: #94a3b8; font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; display: block; margin-bottom: 7px; }
  input, select { width: 100%; background: #0f172a; border: 1.5px solid #334155; border-radius: 10px; color: #f1f5f9; font-size: 15px; font-weight: 600; padding: 11px 13px; outline: none; transition: border-color 0.2s; margin-bottom: 16px; }
  input:focus, select:focus { border-color: #f97316; }
  select option { background: #1e293b; }
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  .btn { border: none; border-radius: 12px; padding: 13px 0; font-size: 15px; font-weight: 700; cursor: pointer; width: 100%; transition: opacity 0.2s; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-green  { background: #22c55e; color: #fff; }
  .btn-red    { background: #dc2626; color: #fff; }
  .btn-orange { background: #f97316; color: #fff; }
  .btn-slate  { background: #334155; color: #cbd5e1; }
  .row { display: flex; gap: 10px; }
  .row > * { flex: 1; }
  .ring-wrap { text-align: center; margin: 16px 0; }
  .ring { display: inline-flex; align-items: center; justify-content: center; width: 160px; height: 160px; border-radius: 50%; border: 4px solid #334155; background: #0f172a; flex-direction: column; transition: border-color 0.3s, box-shadow 0.3s; }
  .ring-time { color: #f1f5f9; font-size: 32px; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: 1px; }
  .ring-status { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; color: #475569; }
  .result-box { background: #0f172a; border: 1.5px solid #f97316; border-radius: 12px; padding: 11px 0; text-align: center; }
  .rlbl { color: #94a3b8; font-size: 10px; font-weight: 600; letter-spacing: 1px; }
  .rval { color: #f97316; font-size: 18px; font-weight: 800; }
  .divider { border-top: 1px solid #334155; margin: 18px 0; }
  .manual-total { background: #0f172a; border: 1.5px solid #334155; border-radius: 12px; padding: 10px 0; text-align: center; }
  .manual-total .rval { color: #94a3b8; font-size: 18px; }
  .colon { color: #475569; font-size: 26px; font-weight: 700; display: flex; align-items: center; padding-top: 18px; flex: 0 0 auto !important; margin-bottom: 16px; }
  .status-msg { text-align: center; font-size: 12px; font-weight: 600; margin-top: 10px; }
  .pending-banner { margin: 8px auto 0; background: #78350f; color: #fbbf24; font-size: 12px; font-weight: 700; border-radius: 8px; padding: 5px 14px; display: inline-block; }
  .log-wrap { width: 100%; max-width: 420px; margin-top: 22px; }
  .log-label { color: #64748b; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
  .log-item { background: #1e293b; border-radius: 10px; padding: 11px 14px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #334155; margin-bottom: 7px; }
  .log-item.pending { border-color: #78350f; }
  .log-id { color: #f1f5f9; font-size: 13px; font-weight: 700; }
  .log-branch { color: #64748b; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
  .log-ts { color: #64748b; font-size: 11px; }
  .log-pickup { color: #f97316; font-size: 13px; font-weight: 700; }
  .log-review { color: #94a3b8; font-size: 13px; font-weight: 700; }
  .mini-lbl { color: #64748b; font-size: 10px; margin-bottom: 4px; text-align: center; }
  input.center { text-align: center; font-size: 20px; font-weight: 800; padding: 10px 6px; margin-bottom: 0; }
  .section-gap { margin-top: 16px; }
</style>
</head>
<body>

<div class="eyebrow" style="margin-bottom:4px">Rider Ops</div>
<div class="title">Test Orders</div>
<div id="pending-wrap" style="text-align:center;margin-bottom:12px"></div>

<div class="card" id="app"></div>
<div id="log-section"></div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwM0WcVfvz6z-6zlsb03697NGPvpHZcJfJDceu4n2WTyvOrZ4Oqit4XEzxQ3hr9O-Q7/exec";

const BRANCHES = [
  "Tmart, Haram - Talbiya 2",
  "Tmart, El Sheikh Zayed - El Hay 13",
  "Tmart, 6th Of October - Palm Hills 360 Mall",
  "Tmart, 6th of October - El Montzah",
  "Tmart, 6th of October - 6th District",
  "talabat mart, Downtown - El Sayeda Zeinab",
  "talabat mart, Zahraa El Maadi - El Shatr El Sades",
  "talabat mart, Zahraa El Maadi - El Me`arag El Ouloy",
  "talabat mart, Shobra - El Sahel",
  "talabat mart, New Maadi - Taqseem Laselky",
  "talabat mart, Nasr City - El Hadeeqa El Dawlia",
  "talabat mart, Mokattam - El Nafora Square",
  "talabat mart, Mokattam - El Mafarik",
  "talabat mart, Mokattam - Easy Sport Club",
  "talabat mart, Mohandesin - Lebanon square",
  "talabat mart, Maadi Old",
  "talabat mart, Helwan",
  "talabat mart, Heliopolis - Hegaz Square",
  "talabat mart, Hadayek El Ahram - Area ح",
  "talabat mart, Faisal - Maryoteya",
  "talabat mart, El Zaitoun - Al Gharbeya",
  "talabat mart, El Sheikh Zayed - El Hay 9",
  "talabat mart, El Daher",
  "talabat mart, Dokki - Mosaddak",
  "talabat mart, Ard El Golf",
  "talabat mart, Al-Manial",
  "talabat mart, Agouza",
  "talabat mart, 6th of October - Wahet El Mohandsen",
  "talabat mart, 6th Of October - Palm Hills",
  "talabat mart, 6th of October - 4th District",
  "talabat mart, Haram - Tersa",
  "Tmart, Tagammoa 5 - Hay 1",
  "Tmart, Tagammoa 5 - Emaar Mivida",
  "tmart, Nasr City - Omarat El Tawfiq",
  "Tmart, Masaken Sheraton - Abdel Hamid Badwai",
  "Tmart, Madinaty - Work Shops",
  "Tmart, ElNakheel compound",
  "Tmart, El Shorouk - 3rd District",
  "Tmart, El Obour Industrial Area BG",
  "Tmart, Creek town Compound",
  "talabat mart, Madinaty - Sporting Club",
  "talabat mart, Tagmoaa 5 - AUC",
  "talabat mart, Tagammoa 5 - South Investors",
  "talabat mart, Tagammoa 5 - El Lotus El Shamaleya",
  "talabat mart, Tagammoa 5 - El Banafseg Buildings",
  "talabat mart, Tagammoa 1",
  "talabat mart, Nasr City - Masaken El Shorouk",
  "Talabat Mart, Nasr City - Hay 8",
  "talabat mart, Nasr City - El Tayaran",
  "talabat mart, Matareya",
  "talabat mart, El Shorouk - 1st Area",
  "talabat mart, El Rehab City",
  "talabat mart, El Obour - El Hay 9",
  "talabat mart, Tagammoa 5 - Banks Center"
];

const QUEUE_KEY = "ot_queue";
const fmtMs = ms => {
  const s = Math.floor(ms/1000), m = Math.floor(s/60);
  return `${String(m).padStart(2,'0')}:${String(s%60).padStart(2,'0')}.${String(Math.floor((ms%1000)/10)).padStart(2,'0')}`;
};
const fmtManual = (m,s) => `${String(+m||0).padStart(2,'0')}:${String(+s||0).padStart(2,'0')}`;
const loadQ = () => { try { return JSON.parse(localStorage.getItem(QUEUE_KEY)||"[]"); } catch { return []; } };
const saveQ = q => localStorage.setItem(QUEUE_KEY, JSON.stringify(q));

async function sendWithRetry(payload, retries=3) {
  for (let i=0; i<retries; i++) {
    try {
      await fetch(APPS_SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(payload)
      });
      return { ok:true };
    } catch {}
    await new Promise(r => setTimeout(r, 1200*(i+1)));
  }
  return { ok:false };
}

let state = {
  branch: localStorage.getItem("ot_branch") || BRANCHES[0],
  orderId: "", elapsed: 0, running: false, finished: false,
  startTime: null, finalMs: null,
  reviewMins: "", reviewSecs: "",
  saving: false, saveStatus: null,
  pendingCount: loadQ().length,
  log: []
};
let ticker = null;

async function flushQueue() {
  const q = loadQ(); if (!q.length) return;
  const remaining = [];
  for (const item of q) {
    const r = await sendWithRetry(item);
    if (!r.ok) remaining.push(item);
  }
  saveQ(remaining);
  state.pendingCount = remaining.length;
  renderPending();
}
window.addEventListener("online", flushQueue);
flushQueue();

function renderPending() {
  document.getElementById("pending-wrap").innerHTML = state.pendingCount > 0
    ? `<div class="pending-banner">⏳ ${state.pendingCount} أوردر لسه مش اتبعت — هيتبعت أول ما يرجع النت</div>`
    : "";
}

function render() {
  renderPending();
  const s = state;
  const ringColor = s.running ? "#22c55e" : s.finished ? "#f97316" : "#334155";
  const ringGlow  = s.running ? `box-shadow:0 0 26px ${ringColor}55` : "";

  let btnHtml = "";
  if (!s.running && !s.finished)
    btnHtml = `<button class="btn btn-green" onclick="startTimer()">▶ Start</button>`;
  else if (s.running)
    btnHtml = `<button class="btn btn-red" onclick="stopTimer()">■ Stop</button>`;

  let resultHtml = s.finished ? `
    <div class="result-box">
      <div class="rlbl">مدة الاستلام</div>
      <div class="rval">${fmtMs(s.finalMs)}</div>
    </div>` : "";

  let reviewHtml = s.finished ? `
    <div class="divider"></div>
    <label class="lbl">وقت مراجعة الأوردر <span style="color:#475569;font-weight:400;text-transform:none;letter-spacing:0">(يدوي)</span></label>
    <div class="row" style="align-items:flex-end">
      <div>
        <div class="mini-lbl">دقايق</div>
        <input class="center" type="number" min="0" max="59" placeholder="00" id="inp-rmins" value="${s.reviewMins}" oninput="updateReview()"/>
      </div>
      <div class="colon">:</div>
      <div>
        <div class="mini-lbl">ثواني</div>
        <input class="center" type="number" min="0" max="59" placeholder="00" id="inp-rsecs" value="${s.reviewSecs}" oninput="updateReview()"/>
      </div>
      <div>
        <div class="mini-lbl">المجموع</div>
        <div class="manual-total"><div class="rval">${fmtManual(s.reviewMins, s.reviewSecs)}</div></div>
      </div>
    </div>
    <div class="row section-gap">
      <button class="btn btn-orange" onclick="submitEntry()" ${s.saving?'disabled':''}>${s.saving?'⏳ جاري الحفظ...':'✓ حفظ في الشيت'}</button>
      <button class="btn btn-slate" onclick="resetTimer()">↺ جديد</button>
    </div>
    ${s.saveStatus==='ok'        ? '<div class="status-msg" style="color:#22c55e">✓ اتحفظ في الشيت</div>' : ''}
    ${s.saveStatus==='duplicate' ? '<div class="status-msg" style="color:#f59e0b">⚠ الأوردر ده اتسجل قبل كده النهارده</div>' : ''}
    ${s.saveStatus==='queued'    ? '<div class="status-msg" style="color:#f59e0b">📵 النت واقع — اتحفظ محلياً وهيتبعت أوتوماتيك</div>' : ''}
    ${s.saveStatus==='err'       ? '<div class="status-msg" style="color:#ef4444">✗ فشل الحفظ</div>' : ''}
  ` : "";

  document.getElementById("app").innerHTML = `
    <label class="lbl">الفرع</label>
    <select id="inp-branch" onchange="state.branch=this.value;localStorage.setItem('ot_branch',this.value)" ${s.running||s.finished?'disabled style="opacity:0.5"':''}>
      ${BRANCHES.map(b=>`<option ${b===s.branch?'selected':''}>${b}</option>`).join('')}
    </select>

    <label class="lbl">Order ID</label>
    <input id="inp-order" placeholder="123456789" value="${s.orderId}"
      style="border-color:${s.orderId&&!s.running?'#f97316':'#334155'};${s.running||s.finished?'opacity:0.5':''}"
      ${s.running||s.finished?'disabled':''} oninput="state.orderId=this.value"/>

    <label class="lbl">مدة الاستلام</label>
    <div class="ring-wrap">
      <div class="ring" style="border-color:${ringColor};${ringGlow}">
        <div class="ring-time" id="ring-time">${fmtMs(s.elapsed)}</div>
        <div class="ring-status" style="color:${s.running?'#22c55e':s.finished?'#f97316':'#475569'}">
          ${s.running?'Running':s.finished?'Stopped':'Ready'}
        </div>
      </div>
    </div>

    <div class="row">
      <div>${btnHtml}</div>
      ${s.finished?`<div>${resultHtml}</div>`:''}
    </div>

    ${reviewHtml}
  `;

  renderLog();
}

function renderLog() {
  if (!state.log.length) { document.getElementById("log-section").innerHTML=""; return; }
  document.getElementById("log-section").innerHTML = `
    <div class="log-wrap">
      <div class="log-label">Session Log</div>
      ${state.log.map(e=>`
        <div class="log-item ${e.pending?'pending':''}">
          <div style="overflow:hidden">
            <div class="log-id">#${e.orderId}</div>
            <div class="log-branch">${e.branch}</div>
            <div class="log-ts">${e.ts}${e.pending?' · ⏳ pending':''}</div>
          </div>
          <div style="text-align:left;flex-shrink:0;margin-right:8px">
            <div class="log-pickup">📦 ${e.pickup}</div>
            <div class="log-review">🔍 ${e.review}</div>
          </div>
        </div>`).join('')}
    </div>`;
}

function startTimer() {
  const inp = document.getElementById("inp-order");
  if (inp) state.orderId = inp.value.trim();
  if (!state.orderId) { alert("حط Order ID الأول"); return; }
  state.elapsed=0; state.finalMs=null; state.finished=false; state.saveStatus=null;
  state.reviewMins=""; state.reviewSecs="";
  state.startTime = Date.now(); state.running=true;
  ticker = setInterval(()=>{ state.elapsed=Date.now()-state.startTime; const el=document.getElementById("ring-time"); if(el) el.textContent=fmtMs(state.elapsed); }, 50);
  render();
}

function stopTimer() {
  clearInterval(ticker);
  state.finalMs = state.elapsed;
  state.running=false; state.finished=true;
  render();
}

function updateReview() {
  state.reviewMins = document.getElementById("inp-rmins")?.value || "";
  state.reviewSecs = document.getElementById("inp-rsecs")?.value || "";
  const el = document.querySelector(".manual-total .rval");
  if (el) el.textContent = fmtManual(state.reviewMins, state.reviewSecs);
}

async function submitEntry() {
  state.saving=true; state.saveStatus=null; render();
  const payload = {
    orderId: state.orderId,
    agent: state.branch,
    zone: state.branch,
    pickupMs: state.finalMs,
    reviewMins: parseInt(state.reviewMins)||0,
    reviewSecs: parseInt(state.reviewSecs)||0,
  };
  const result = await sendWithRetry(payload);
  const entry = {
    orderId: payload.orderId, branch: state.branch,
    pickup: fmtMs(state.finalMs),
    review: fmtManual(payload.reviewMins, payload.reviewSecs),
    ts: new Date().toLocaleTimeString("ar-EG"),
    pending: !result.ok
  };
  if (result.duplicate)     { state.saveStatus="duplicate"; }
  else if (result.ok)       { state.saveStatus="ok"; state.log.unshift(entry); }
  else {
    const q=loadQ(); q.push({...payload,_queuedAt:Date.now()}); saveQ(q);
    state.pendingCount=q.length; state.saveStatus="queued"; state.log.unshift(entry);
  }
  state.saving=false; render();
}

function resetTimer() {
  clearInterval(ticker);
  state.elapsed=0; state.finalMs=null; state.running=false; state.finished=false;
  state.orderId=""; state.reviewMins=""; state.reviewSecs=""; state.saveStatus=null;
  render();
}

render();
</script>
</body>
</html>
